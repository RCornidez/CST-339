<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Home', ~{::main})}" xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<main class="container mt-5">
    <section class="py-5 text-center">
        <h1 class="display-4 fw-bold">Welcome</h1>
        <p class="lead text-muted">A starting point for your milestone application.</p>
        <div class="mt-4 d-flex gap-3 justify-content-center">
            <a th:href="@{/login}" class="btn btn-primary btn-lg">Sign In</a>
        </div>
    </section>
    <section class="row mt-5 g-4">
        <div class="col-md-4">
            <div class="card h-100 text-center p-4">
                <h5 class="card-title">Inventory Tracking</h5>
                <p class="card-text text-muted">Manage products, stock levels, and item details.</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 text-center p-4">
                <h5 class="card-title">Order Management</h5>
                <p class="card-text text-muted">View and organize customer orders in one place.</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 text-center p-4">
                <h5 class="card-title">Reporting</h5>
                <p class="card-text text-muted">Prepare your application for business insights and summaries.</p>
            </div>
        </div>
    </section>
</main>
</body>
</html>
