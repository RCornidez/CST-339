<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Register', ~{::main})}" xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center">Create Account</h1>

                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                   id="firstName"
                                   th:field="*{firstName}"
                                   placeholder="Enter your first name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                   id="lastName"
                                   th:field="*{lastName}"
                                   placeholder="Enter your last name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="emailAddress" class="form-label">Email Address</label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('emailAddress')} ? 'is-invalid'"
                                   id="emailAddress"
                                   th:field="*{emailAddress}"
                                   placeholder="Enter your email">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('emailAddress')}" th:errors="*{emailAddress}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label">Phone Number</label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                   id="phoneNumber"
                                   th:field="*{phoneNumber}"
                                   placeholder="Enter your phone number">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   id="username"
                                   th:field="*{username}"
                                   placeholder="Choose a username">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   id="password"
                                   th:field="*{password}"
                                   placeholder="Choose a password">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Register</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <p class="mb-2">Already have an account?</p>
                        <a th:href="@{/login}" class="btn btn-outline-secondary">Sign In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
