<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Product', ~{::main})}" xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center"
                        th:text="${product.id != null} ? 'Edit Product' : 'Create Product'">Product</h1>

                    <form th:action="${formAction}" th:object="${product}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   th:field="*{name}"
                                   placeholder="Enter product name"
                                   maxlength="100">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control"
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                      th:field="*{description}"
                                      rows="3"
                                      placeholder="Enter product description"
                                      maxlength="200"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU</label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('sku')} ? 'is-invalid'"
                                   th:field="*{sku}"
                                   placeholder="Enter SKU"
                                   maxlength="50">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                        </div>

                        <div class="row">
                            <div class="col-sm-6 mb-3">
                                <label for="price" class="form-label">Price</label>
                                <div class="input-group has-validation">
                                    <span class="input-group-text">$</span>
                                    <input type="number"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                           th:field="*{price}"
                                           placeholder="0.00"
                                           min="0"
                                           step="0.01">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                            </div>

                            <div class="col-sm-6 mb-3">
                                <label for="quantity" class="form-label">Quantity</label>
                                <input type="number"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                                       th:field="*{quantity}"
                                       placeholder="0"
                                       min="0"
                                       step="1">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <a th:href="@{/products/list}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                            <button type="submit" class="btn btn-primary flex-fill"
                                    th:text="${product.id != null} ? 'Save Changes' : 'Create Product'">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
