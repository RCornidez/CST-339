<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Products', ~{::main})}" xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<main class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Products</h2>
        <a th:href="@{/products/new}" class="btn btn-primary">Create Product</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>SKU</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${products.empty}">
                    <td colspan="6" class="text-center text-muted">No products found.</td>
                </tr>
                <tr th:each="product : ${products}">
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.description}"></td>
                    <td th:text="${product.sku}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td th:text="${product.quantity}"></td>
                    <td>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}"
                           class="btn btn-sm btn-outline-secondary me-1">Edit</a>
                        <form th:action="@{/products/{id}(id=${product.id})}"
                              method="post" style="display:inline">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
